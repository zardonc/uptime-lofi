name: Maintainer Staging (Optional)
run-name: Optional maintainer staging deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-maintainer-staging
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests before optional maintainer staging
        run: |
          pnpm --filter frontend lint
          pnpm --filter frontend test
          pnpm --filter backend test
